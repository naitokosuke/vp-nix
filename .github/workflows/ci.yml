name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      needs_build: ${{ steps.filter.outputs.needs_build }}
    steps:
      - uses: actions/checkout@v6
      - name: Check for build-relevant changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "needs_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Check if any non-doc files changed
          CHANGED=$(gh pr diff ${{ github.event.pull_request.number }} --name-only | grep -vcE '\.(md)$|^LICENSE$|^\.gitignore$' || true)
          if [ "$CHANGED" -gt 0 ]; then
            echo "needs_build=true" >> $GITHUB_OUTPUT
          else
            echo "needs_build=false" >> $GITHUB_OUTPUT
            echo "Only documentation changes, skipping build"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  build:
    needs: changes
    if: needs.changes.outputs.needs_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest   # aarch64-darwin
            system: aarch64-darwin
          - os: ubuntu-latest  # x86_64-linux
            system: x86_64-linux
          # x86_64-darwin (macos-13) and aarch64-linux are defined in the flake
          # but have no standard GitHub-hosted runners, so they are not built in CI.
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Setup Cachix
        uses: cachix/cachix-action@v16
        with:
          name: vp-nix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      # nix flake check evaluates all flake outputs and builds this system's
      # checks. checks.${system}.vite-plus-version already runs `vp --version`,
      # which depends on the full package build, so this covers build + smoke test.
      - name: Run flake checks
        run: nix flake check --print-build-logs

  ci-complete:
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.changes.result }}" == "failure" ]]; then
            echo "Change detection failed"
            exit 1
          fi
          if [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "Build failed"
            exit 1
          fi
          echo "CI complete (changes: ${{ needs.changes.result }}, build: ${{ needs.build.result }})"
